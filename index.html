<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>KYTALYST — Deal Scanner</title>
<style>
  :root{
    --ink:#12181f;
    --paper:#eef0ea;
    --card:#1b232c;
    --line:#2c3641;
    --copper:#b5652f;
    --copper-bright:#d97f42;
    --green:#4f8f5b;
    --red:#b1483f;
    --muted:#8592a0;
    --widget-scheme: dark;
    --mono: 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  :root[data-theme="light"]{
    --ink:#f2efe6;
    --paper:#1c2420;
    --card:#ffffff;
    --line:#d8d3c4;
    --copper:#a8481f;
    --copper-bright:#c25a2a;
    --green:#2f6b3f;
    --red:#a8382f;
    --muted:#6b6b60;
    --widget-scheme: light;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--paper);font-family:var(--sans);}
  body{min-height:100vh; padding-bottom:60px;}

  .topbar{
    padding:22px 20px 18px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; justify-content:space-between;
  }
  .wordmark{font-family:var(--serif); font-size:22px; letter-spacing:0.5px; font-weight:700; color:var(--paper);}
  .wordmark span{color:var(--copper-bright);}
  .tagline{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.2px;}

  .theme-toggle{
    background:transparent; border:1px solid var(--line); color:var(--muted);
    font-family:var(--mono); font-size:11px; letter-spacing:0.5px; text-transform:uppercase;
    padding:6px 12px; border-radius:20px; cursor:pointer; align-self:flex-start;
  }
  .theme-toggle:active{ border-color:var(--copper); color:var(--copper-bright); }

  .search-panel{padding:24px 20px 8px;}
  .search-label{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; display:block;}
  .search-row{display:flex; gap:8px;}
  input[type="text"]{
    flex:1; background:var(--card); border:1px solid var(--line); color:var(--paper);
    font-family:var(--sans); font-size:16px; padding:14px 14px; border-radius:2px; outline:none;
  }
  input[type="text"]:focus{border-color:var(--copper);}
  input[type="text"]::placeholder{color:var(--muted);}
  button.scan-btn{
    background:var(--copper); color:#fff; border:none; font-family:var(--mono);
    font-size:13px; letter-spacing:0.5px; text-transform:uppercase; font-weight:600;
    padding:0 20px; border-radius:2px; cursor:pointer; white-space:nowrap;
  }
  button.scan-btn:active{background:var(--copper-bright);}
  button.scan-btn:disabled{background:#3a4048; color:var(--muted); cursor:default;}

  .status-line{
    font-family:var(--mono); font-size:12px; color:var(--muted); padding:14px 20px 0; min-height:18px;
  }

  .verdict-banner{
    margin:22px 20px 0; padding:20px; border-radius:3px; border:1px solid;
    display:flex; align-items:center; justify-content:space-between;
  }
  .verdict-banner.deal{ background:rgba(79,143,91,0.12); border-color:var(--green); }
  .verdict-banner.nodeal{ background:rgba(177,72,63,0.12); border-color:var(--red); }
  .verdict-word{font-family:var(--serif); font-size:28px; font-weight:700;}
  .verdict-banner.deal .verdict-word{color:var(--green);}
  .verdict-banner.nodeal .verdict-word{color:#e08b83;}
  .verdict-sub{font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:4px;}
  .status-badge{
    display:inline-block; margin-top:8px; font-family:var(--mono); font-size:10.5px;
    font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
    padding:3px 9px; border-radius:20px; border:1px solid;
  }
  .status-badge.active{ color:var(--green); border-color:var(--green); background:rgba(79,143,91,0.12); }
  .status-badge.inactive{ color:#e08b83; border-color:var(--red); background:rgba(177,72,63,0.12); }
  .verdict-profit{text-align:right;}
  .verdict-profit .num{font-family:var(--mono); font-size:22px; font-weight:600;}
  .verdict-profit .lbl{font-family:var(--mono); font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;}

  .metrics-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line);
    margin:16px 20px 0; border:1px solid var(--line); border-radius:3px; overflow:hidden;
  }
  .metric-cell{background:var(--card); padding:14px 16px;}
  .metric-cell .lbl{font-family:var(--mono); font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; display:block; margin-bottom:6px;}
  .metric-cell .val{font-family:var(--mono); font-size:17px; font-weight:600; color:var(--paper);}

  .section{margin:24px 20px 0;}
  .section-head{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px;}

  .chip-row{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{
    font-family:var(--mono); font-size:11px; background:rgba(213,127,66,0.15); color:var(--copper-bright);
    padding:5px 10px; border-radius:20px; border:1px solid rgba(213,127,66,0.3);
  }

  .comp-row{
    display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line);
    font-family:var(--mono); font-size:13px;
  }
  .comp-row:last-child{border-bottom:none;}
  .comp-addr{color:var(--paper);}
  .comp-price{color:var(--muted);}

  .rehab-breakdown{font-family:var(--mono); font-size:12px; color:var(--muted); line-height:1.9;}
  .rehab-breakdown .rline{display:flex; justify-content:space-between;}
  .rehab-breakdown .rline b{color:var(--paper); font-weight:500;}

  .agent-card{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--card); border:1px solid var(--line); border-radius:3px; padding:14px 16px;
  }
  .agent-name{font-family:var(--serif); font-size:15px; color:var(--paper); font-weight:700;}
  .agent-office{font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:2px;}
  .agent-actions{display:flex; gap:8px;}
  .agent-btn{
    font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;
    text-decoration:none; padding:8px 14px; border-radius:20px; border:1px solid var(--copper);
    color:var(--copper-bright); white-space:nowrap;
  }
  .agent-btn:active{ background:var(--copper); color:#fff; }

  .walkthrough-box{
    background:var(--card); border:1px solid var(--line); border-radius:3px; padding:16px;
  }
  .wt-row{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;}
  .wt-row select, .wt-row input{
    background:var(--ink); color:var(--paper); border:1px solid var(--line);
    font-family:var(--sans); font-size:14px; padding:10px; border-radius:2px; outline:none; width:100%;
  }
  .wt-qty-add{display:flex; gap:8px;}
  .wt-qty-add input{width:70px; flex:none;}
  .wt-add-btn{
    flex:1; background:var(--green); color:#fff; border:none; font-family:var(--mono);
    font-size:12px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600;
    border-radius:2px; cursor:pointer;
  }
  .wt-item-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 0; border-bottom:1px solid var(--line); font-family:var(--mono); font-size:12.5px;
  }
  .wt-item-row:last-of-type{border-bottom:none;}
  .wt-item-desc{color:var(--paper);}
  .wt-item-sub{color:var(--muted); font-size:11px; margin-top:1px;}
  .wt-item-right{display:flex; align-items:center; gap:10px;}
  .wt-item-cost{color:var(--paper); font-weight:600;}
  .wt-remove{
    background:transparent; border:1px solid var(--red); color:#e08b83; border-radius:20px;
    font-family:var(--mono); font-size:10px; padding:3px 8px; cursor:pointer;
  }
  .wt-total-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:12px; padding-top:12px; border-top:1px solid var(--line);
    font-family:var(--mono); font-weight:700; color:var(--paper);
  }
  .wt-empty{font-family:var(--mono); font-size:11.5px; color:var(--muted); padding:8px 0;}
  .wt-source-note{font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:10px; line-height:1.5;}

  .empty-state{padding:60px 20px; text-align:center;}
  .empty-state .glyph{font-size:32px; opacity:0.3; margin-bottom:14px;}
  .empty-state p{font-family:var(--mono); font-size:12px; color:var(--muted); max-width:280px; margin:0 auto; line-height:1.7;}

  .mock-note{
    margin:20px 20px 0; padding:10px 14px; background:rgba(213,127,66,0.08); border:1px dashed var(--copper);
    border-radius:2px; font-family:var(--mono); font-size:10.5px; color:var(--copper-bright); line-height:1.6;
  }

  /* Places Autocomplete container — wraps Google's element to match the existing input look */
  /* Places Autocomplete — Google added real CSS support for these directly on the element */
  .address-autocomplete-wrap{
    flex:1; position:relative; z-index:10;
  }
  .address-autocomplete-wrap gmp-place-autocomplete{
    width:100%;
    color-scheme: var(--widget-scheme);
    background-color: var(--card);
    border: 1px solid var(--line);
    border-radius: 2px;
  }
</style>

  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('kytalyst-theme', theme);
  const btn = document.getElementById('themeToggleBtn');
  if (btn) btn.textContent = theme === 'light' ? '🌙 Dark' : '☀ Light';
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  applyTheme(current === 'light' ? 'dark' : 'light');
}

let lastScanData = null;
let walkthroughItems = [];

function catalogTrades(){
  return [...new Set(CATALOG.map(r => r.t))].sort();
}
function catalogPackages(trade){
  return [...new Set(CATALOG.filter(r => r.t === trade).map(r => r.p))].sort();
}
function catalogTiers(trade, pkg){
  return CATALOG.filter(r => r.t === trade && r.p === pkg);
}
function walkthroughTotal(){
  return walkthroughItems.reduce((sum, it) => sum + it.unitCost * it.qty, 0);
}

function populateWalkthroughDropdowns(){
  const tradeSel = document.getElementById('wtTrade');
  if (!tradeSel) return;
  tradeSel.innerHTML = catalogTrades().map(t => `<option value="${t}">${t}</option>`).join('');
  onTradeChange();
}
function onTradeChange(){
  const trade = document.getElementById('wtTrade').value;
  const pkgSel = document.getElementById('wtPackage');
  pkgSel.innerHTML = catalogPackages(trade).map(p => `<option value="${p}">${p}</option>`).join('');
  onPackageChange();
}
function onPackageChange(){
  const trade = document.getElementById('wtTrade').value;
  const pkg = document.getElementById('wtPackage').value;
  const tierSel = document.getElementById('wtTier');
  const tiers = catalogTiers(trade, pkg);
  tierSel.innerHTML = tiers.map(r => `<option value="${r.tier}">${r.tl} — ${money(r.c)}</option>`).join('');
}
function addWalkthroughItem(){
  const trade = document.getElementById('wtTrade').value;
  const pkg = document.getElementById('wtPackage').value;
  const tier = document.getElementById('wtTier').value;
  const qty = Math.max(1, parseInt(document.getElementById('wtQty').value, 10) || 1);
  const record = catalogTiers(trade, pkg).find(r => r.tier === tier);
  if (!record) return;
  walkthroughItems.push({
    trade, pkg, tierLabel: record.tl, unitCost: record.c, qty
  });
  renderResults();
}
function removeWalkthroughItem(idx){
  walkthroughItems.splice(idx, 1);
  renderResults();
}

// --- Google Places Autocomplete (frontend-only; does not touch kytalystScan or RentCast calls) ---
(async function initAutocomplete(){
  try {
    const { PlaceAutocompleteElement } = await google.maps.importLibrary("places");

    const autocompleteEl = new PlaceAutocompleteElement({
      includedRegionCodes: ["us"],
      includedPrimaryTypes: ["street_address", "premise", "subpremise"]
    });
    autocompleteEl.placeholder = "Start typing a property address...";
    document.getElementById('autocompleteMount').appendChild(autocompleteEl);

    const hiddenInput = document.getElementById('addressInput');

    // Fallback: if the user types a full address but never picks a dropdown suggestion,
    // keep the hidden field in sync with their raw typed text so Scan still works.
    autocompleteEl.addEventListener('input', () => {
      if (typeof autocompleteEl.value === 'string') {
        hiddenInput.value = autocompleteEl.value;
      }
    });

    // On selection: parse into clean, structured "Street, City, State, Zip" — what RentCast expects.
    autocompleteEl.addEventListener('gmp-select', async ({ placePrediction }) => {
      const place = placePrediction.toPlace();
      await place.fetchFields({ fields: ['addressComponents', 'formattedAddress'] });

      const comps = place.addressComponents || [];
      const get = (type) => comps.find(c => c.types && c.types.includes(type));

      const streetNumber = get('street_number')?.longText || '';
      const route = get('route')?.longText || '';
      const city = (get('locality') || get('sublocality'))?.longText || '';
      const state = get('administrative_area_level_1')?.shortText || '';
      const zip = get('postal_code')?.longText || '';

      const streetLine = [streetNumber, route].filter(Boolean).join(' ');
      const cleanAddress = [streetLine, city, [state, zip].filter(Boolean).join(' ')]
        .filter(Boolean).join(', ');

      hiddenInput.value = cleanAddress || place.formattedAddress || autocompleteEl.value || '';
    });
  } catch (err) {
    console.warn('Places Autocomplete failed to load — manual address entry via the hidden default still works:', err);
  }
})();

function estimateRehab(sqft, yearBuilt){
  const currentYear = new Date().getFullYear();
  const age = currentYear - (yearBuilt || currentYear - 40);
  let base = 25000;
  base += age > 40 ? 3000 : (age > 20 ? 1000 : 0);
  const over2000 = Math.max(0, Math.floor((sqft - 2000) / 500));
  base += over2000 * 3000;
  const unknownsBuffer = base * 0.25;
  return { base: Math.round(base), unknownsBuffer: Math.round(unknownsBuffer), total: Math.round(base + unknownsBuffer) };
}

function evaluateDeal({ listPrice, arv, rehabTotal, wantedProfit }){
  const closingCosts = listPrice * 0.035;
  const sellingCosts = arv * (0.0125 + 0.03 + 0.06);
  const allInCost = listPrice + rehabTotal + closingCosts;
  const netSalePrice = arv - sellingCosts;
  const projectedProfit = netSalePrice - allInCost;
  const isDeal = projectedProfit >= wantedProfit;
  const mao = arv - sellingCosts - rehabTotal - closingCosts - wantedProfit;
  return { projectedProfit: Math.round(projectedProfit), isDeal, mao: Math.round(mao), allInCost: Math.round(allInCost) };
}

function money(n){
  const sign = n < 0 ? "-" : "";
  return sign + "$" + Math.abs(Math.round(n)).toLocaleString();
}

async function fetchMockScan(address){
  await new Promise(r => setTimeout(r, 900));
  const sqft = 1657, yearBuilt = 2004, listPrice = 160000, arv = 255000;

async function fetchRealScan(address){
  const res = await fetch(CLOUD_FUNCTION_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ address })
  });
  if(!res.ok){
    const errBody = await res.json().catch(() => ({}));
    const err = new Error(errBody.error || ("Backend returned " + res.status));
    err.status = res.status;
    throw err;
  }
  return await res.json();
}

async function runScan(){
  const address = document.getElementById('addressInput').value.trim();
  if(!address) return;
  const btn = document.getElementById('scanBtn');
  const statusLine = document.getElementById('statusLine');
  btn.disabled = true;
  statusLine.textContent = "Pulling property data + comps…";
  document.getElementById('resultsWrap').innerHTML = "";
  document.getElementById('emptyState').style.display = "none";
  document.getElementById('mockNotice').style.display = "none";

  let data;
  let usingMock = false;
  try{
    data = await fetchRealScan(address);
  }catch(err){
    if (err.status === 404) {
      // Genuinely normal outcome — this address just isn't for sale right now. Not a failure.
      statusLine.textContent = "";
      const emptyState = document.getElementById('emptyState');
      emptyState.style.display = "block";
      emptyState.innerHTML = `
        <div class="glyph">⌂</div>
        <p><strong>No active listing found</strong> for this address.<br>KYTALYST only scans properties currently for sale — this one just isn't listed right now.</p>
      `;
      btn.disabled = false;
      return;
    }
    console.warn("Live backend failed, falling back to mock:", err.message);
    usingMock = true;
    try{
      data = await fetchMockScan(address);
    }catch(mockErr){
      statusLine.textContent = "Scan failed: " + err.message;
      btn.disabled = false;
      return;
    }
  }

  document.getElementById('mockNotice').style.display = usingMock ? "block" : "none";
  statusLine.textContent = "";
  btn.disabled = false;

  lastScanData = data;
  walkthroughItems = [];
  renderResults();
}

function renderResults(){
  const data = lastScanData;
  if (!data) return;

  const wantedProfit = 20000;
  const usingWalkthrough = walkthroughItems.length > 0;
  const rehabTotalUsed = usingWalkthrough ? walkthroughTotal() : data.rehab.total;
  const deal = evaluateDeal({ listPrice: data.listPrice, arv: data.arv, rehabTotal: rehabTotalUsed, wantedProfit });

  const wrap = document.getElementById('resultsWrap');
  wrap.innerHTML = `
    <div class="verdict-banner ${deal.isDeal ? 'deal' : 'nodeal'}">
      <div>
        <div class="verdict-word">${deal.isDeal ? 'DEAL' : 'NO DEAL'}</div>
        <div class="verdict-sub">${data.address}</div>
        <div class="status-badge ${data.listingStatus === 'Active' ? 'active' : 'inactive'}">

      </div>
      <div class="verdict-profit">
        <div class="num">${money(deal.projectedProfit)}</div>
        <div class="lbl">Projected Profit</div>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric-cell"><span class="lbl">List Price</span><span class="val">${money(data.listPrice)}</span></div>
      <div class="metric-cell"><span class="lbl">ARV</span><span class="val">${money(data.arv)}</span></div>
      <div class="metric-cell"><span class="lbl">${usingWalkthrough ? 'Rehab (Walkthrough)' : 'Rehab (Formula Est.)'}</span><span class="val">${money(rehabTotalUsed)}</span></div>
      <div class="metric-cell"><span class="lbl">Max Offer (MAO)</span><span class="val">${money(deal.mao)}</span></div>
      <div class="metric-cell"><span class="lbl">Sqft</span><span class="val">${(data.sqft || 0).toLocaleString()}</span></div>
      <div class="metric-cell"><span class="lbl">Year Built</span><span class="val">${data.yearBuilt || "—"}</span></div>
    </div>

    <div class="section">
      <div class="section-head">Distress Signals · ${data.rehabTier} rehab tier</div>
      <div class="chip-row">
        ${(data.distressSignals && data.distressSignals.length) ? data.distressSignals.map(s => `<span class="chip">${s}</span>`).join('') : '<span class="chip">none detected</span>'}
      </div>
    </div>

    <div class="section">
      <div class="section-head">Formula Rehab Estimate (age/size guess — replace with walkthrough below)</div>
      <div class="rehab-breakdown">
        <div class="rline"><span>Base estimate (age/size)</span><b>${money(data.rehab.base)}</b></div>
        <div class="rline"><span>Unknowns buffer (25%)</span><b>${money(data.rehab.unknownsBuffer)}</b></div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">Live Walkthrough — Real JOBSpan Pricing</div>
      <div class="walkthrough-box">
        <div class="wt-row">
          <select id="wtTrade" onchange="onTradeChange()"></select>
          <select id="wtPackage" onchange="onPackageChange()"></select>
        </div>
        <div class="wt-row">
          <select id="wtTier"></select>
          <div class="wt-qty-add">
            <input type="number" id="wtQty" value="1" min="1">
            <button class="wt-add-btn" onclick="addWalkthroughItem()">Add</button>
          </div>
        </div>

        ${walkthroughItems.length ? walkthroughItems.map((it, i) => `
          <div class="wt-item-row">
            <div>
              <div class="wt-item-desc">${it.pkg} — ${it.tierLabel}</div>
              <div class="wt-item-sub">${it.trade} · Qty ${it.qty}</div>
            </div>
            <div class="wt-item-right">
              <span class="wt-item-cost">${money(it.unitCost * it.qty)}</span>
              <button class="wt-remove" onclick="removeWalkthroughItem(${i})">Remove</button>
            </div>
          </div>
        `).join('') : '<div class="wt-empty">No items added yet — pick a trade and package above, then tap Add as you walk the house.</div>'}

        ${walkthroughItems.length ? `
        <div class="wt-total-row">
          <span>Walkthrough Total</span>
          <span>${money(walkthroughTotal())}</span>
        </div>` : ''}

        <div class="wt-source-note">Prices are real contractor cost from 7 Pillars' audited JOBSpan catalog (16 trades, 89 packages) — not customer-facing quotes. Trades without real data yet (roofing, siding, tiling, etc.) aren't in this list rather than showing a fake number.</div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">Comparable Sales</div>
      ${(data.comps && data.comps.length) ? data.comps.map(c => `<div class="comp-row"><span class="comp-addr">${c.addr}</span><span class="comp-price">${money(c.price)}</span></div>`).join('') : '<div class="comp-row"><span class="comp-addr">No comps returned</span></div>'}

    ${data.agentName ? `
    <div class="section">
      <div class="section-head">Listing Agent</div>

          <div class="agent-name">${data.agentName}</div>

        <div class="agent-actions">
          ${data.agentPhone ? `<a class="agent-btn" href="tel:${data.agentPhone}">Call</a>` : ''}
          ${data.agentEmail ? `<a class="agent-btn" href="mailto:${data.agentEmail}">Email</a>` : ''}

  populateWalkthroughDropdowns();
}
